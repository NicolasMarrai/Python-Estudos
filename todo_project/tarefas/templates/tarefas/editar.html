<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Editar Tarefa</title>
  </head>
  <body>
    <h1>Editar Tarefa</h1>
    <form method="post">
      {% csrf_token %}
      <label>Titulo</label>
      <input
        type="text"
        name="titulo"
        value="{{ tarefa.titulo}}"
        required
      /><br />

      <label>Descrição</label>
      <textarea name="descricao">{{tarefa.descricao}}</textarea> <br />

      <label>Finalizado</label>
      <input
        type="checkbox"
        name="finalizado"
        {%
        if
        tarefa.finalizado
        %}
        checked
        {%
        endif
        %}
      />
      <br />

      <button type="submit">Salvar Alterações</button>
    </form>

    <p>
      <a href="{% url 'listarTarefas' %}">Voltar</a>
    </p>
  </body>
</html>
