<!doctype html>
<html>
  <head>
    <title>Editar Nota</title>
  </head>
  <body>
    <h1>Editar Nota</h1>

    <form method="POST">
      {% csrf_token %}

      <label>Título:</label>
      <br />
      <input type="text" name="titulo" value="{{ nota.titulo }}" />

      <br /><br />

      <label>Conteúdo:</label>
      <br />
      <textarea name="conteudo">{{ nota.conteudo }}</textarea>

      <br /><br />

      <label>
        <input
          type="checkbox"
          name="importante"
          {%
          if
          nota.importante
          %}
          checked
          {%
          endif
          %}
        />
        Nota importante
      </label>

      <br /><br />

      <button type="submit">Salvar Alterações</button>
    </form>

    <br />

    <a href="/">Voltar</a>
  </body>
</html>
